services:
  - type: web
    name: documind-ai
    env: python
    region: oregon
    plan: starter
    rootDir: .
    buildCommand: |
      pip install --upgrade pip
      pip uninstall pinecone-client pinecone -y || true
      pip cache purge
      pip install -r requirements.txt
      cd frontend && npm install && REACT_APP_API_URL=https://documindrex.onrender.com npm run build
    startCommand: python documind_main.py
    healthCheckPath: /health
    envVars:
      - key: VECTOR_DB_PROVIDER
        value: pinecone
      - key: RERANKER_PROVIDER
        value: cohere
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: NODE_VERSION
        value: 18.17.0
      - key: REACT_APP_API_URL
        value: https://documindrex.onrender.com
